name: AgriConnect CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:

  # ─────────────────────────────────────────────────────────────────────────────
  # 1. Selenium E2E Web Tests
  # ─────────────────────────────────────────────────────────────────────────────
  selenium-e2e-web-tests:
    name: Selenium E2E Web Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js 18
        uses: actions/setup-node@v4
        with:
          node-version: "18"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: ./frontend
        run: npm ci

      - name: Build frontend
        working-directory: ./frontend
        run: npm run build

      - name: Install Chrome & ChromeDriver
        uses: browser-actions/setup-chrome@v1

      - name: Install selenium-webdriver
        run: npm install -g selenium-webdriver

      - name: Run Selenium E2E tests
        run: python ./frontend/run_selenium_simulation.py

      - name: Upload Selenium test report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: selenium-test-report
          path: ./frontend/test-results/
          if-no-files-found: ignore

  # ─────────────────────────────────────────────────────────────────────────────
  # 2. Appium Android E2E Report
  # ─────────────────────────────────────────────────────────────────────────────
  appium-android-e2e-report:
    name: Appium Android E2E Report
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "17"

      - name: Set up Node.js 18
        uses: actions/setup-node@v4
        with:
          node-version: "18"

      - name: Install Appium v3 & uiautomator2 driver
        run: |
          npm install -g appium@next
          appium driver install uiautomator2

      - name: Enable KVM (Android emulator hardware acceleration)
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | \
            sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm
          sudo apt-get install -y libvirt-clients

      - name: Grant gradlew execute permission
        run: chmod +x ./backend/android/gradlew

      - name: Build APK (debug)
        working-directory: ./backend/android
        run: ./gradlew assembleDebug --no-daemon

      - name: Run Appium tests inside Android emulator
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 30
          target: default
          arch: x86_64
          profile: Nexus 6
          script: bash ./backend/run_appium_tests.sh

      - name: Upload Appium test report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: appium-test-report
          path: ./backend/test-results/
          if-no-files-found: ignore

  # ─────────────────────────────────────────────────────────────────────────────
  # 3. Backend & Frontend Simulation
  # ─────────────────────────────────────────────────────────────────────────────
  backend-frontend-simulation:
    name: Backend & Frontend Simulation
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js 18
        uses: actions/setup-node@v4
        with:
          node-version: "18"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "17"

      - name: Install frontend dependencies
        working-directory: ./frontend
        run: npm ci

      - name: Build frontend (production)
        working-directory: ./frontend
        run: npm run build

      - name: Simulate frontend dev server
        working-directory: ./frontend
        run: |
          npx vite preview --host 0.0.0.0 --port 4173 &
          sleep 8
          curl -f http://localhost:4173 && echo "✅ Frontend responding" || echo "⚠️ Frontend check failed (non-blocking)"

      - name: Grant gradlew execute permission
        run: chmod +x ./backend/android/gradlew

      - name: Build backend APK (debug)
        working-directory: ./backend/android
        run: ./gradlew assembleDebug --no-daemon

      - name: Verify APK output
        run: |
          APK_PATH="./backend/android/app/build/outputs/apk/debug/app-debug.apk"
          if [ -f "$APK_PATH" ]; then
            echo "✅ APK built successfully: $APK_PATH"
            ls -lh "$APK_PATH"
          else
            echo "❌ APK not found"
            exit 1
          fi

      - name: Copy artifacts to root for report compilation
        run: cp -r ./backend/artifacts ./artifacts

      - name: Install Python dependencies for reporting
        run: pip install openpyxl

      - name: Generate Consolidated Excel Test Reports
        run: python ./frontend/scripts/generate_report.py

      - name: Copy compiled reports back to backend
        run: cp -r ./artifacts/test-reports ./backend/artifacts/

      - name: Upload build and Excel test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-and-reports
          path: |
            ./frontend/dist/
            ./backend/android/app/build/outputs/apk/debug/app-debug.apk
            ./backend/artifacts/test-reports/AgriConnect_Test_Report.xlsx
            ./backend/artifacts/test-reports/separate-sheets/
          if-no-files-found: ignore

  # ─────────────────────────────────────────────────────────────────────────────
  # 4. Baseline/Load Testing
  # ─────────────────────────────────────────────────────────────────────────────
  load-testing:
    name: Baseline/Load Testing
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js 18
        uses: actions/setup-node@v4
        with:
          node-version: "18"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: ./frontend
        run: npm ci

      - name: Build frontend (production)
        working-directory: ./frontend
        run: npm run build

      - name: Start frontend server
        working-directory: ./frontend
        run: |
          npx vite preview --host 0.0.0.0 --port 4173 &
          sleep 8
          curl -f http://localhost:4173 && echo "✅ Server responding" || echo "⚠️ Server check failed"

      - name: Run Autocannon Load Test (300 users, 60s)
        working-directory: ./frontend
        run: npx autocannon -c 300 -d 60 http://localhost:4173
