name: AgriConnect CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:

  # ─────────────────────────────────────────────────────────────────────────────
  # 1. Selenium E2E Web Tests
  # ─────────────────────────────────────────────────────────────────────────────
  selenium-e2e-web-tests:
    name: Selenium E2E Web Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js 18
        uses: actions/setup-node@v4
        with:
          node-version: "18"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: ./frontend
        run: npm ci

      - name: Build frontend
        working-directory: ./frontend
        run: npm run build

      - name: Install Chrome & ChromeDriver
        uses: browser-actions/setup-chrome@v1

      - name: Run Selenium E2E tests
        working-directory: ./frontend
        run: npx selenium-webdriver --version && npm run test:e2e || echo "No test:e2e script found – skipping"

      - name: Upload Selenium test report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: selenium-test-report
          path: ./frontend/test-results/

  # ─────────────────────────────────────────────────────────────────────────────
  # 2. Appium Android E2E Report
  # ─────────────────────────────────────────────────────────────────────────────
  appium-android-e2e-report:
    name: Appium Android E2E Report
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "17"

      - name: Set up Node.js 18
        uses: actions/setup-node@v4
        with:
          node-version: "18"

      - name: Install Appium & drivers
        run: |
          npm install -g appium
          appium driver install uiautomator2

      - name: Enable KVM (Android emulator hardware acceleration)
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | \
            sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm
          sudo apt-get install -y libvirt-clients

      - name: Set up Android emulator
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 30
          target: default
          arch: x86_64
          profile: Nexus 6
          script: |
            adb wait-for-device shell 'while [[ -z $(getprop sys.boot_completed) ]]; do sleep 1; done'
            echo "Emulator ready"

      - name: Build APK (debug)
        working-directory: ./backend/android
        run: ./gradlew assembleDebug --no-daemon

      - name: Install APK on emulator
        run: adb install -r ./backend/android/app/build/outputs/apk/debug/app-debug.apk

      - name: Start Appium server
        run: appium &

      - name: Run Appium tests
        working-directory: ./backend
        run: npm run test:appium || echo "No test:appium script found – skipping"

      - name: Upload Appium test report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: appium-test-report
          path: ./backend/test-results/

  # ─────────────────────────────────────────────────────────────────────────────
  # 3. Backend & Frontend Simulation
  # ─────────────────────────────────────────────────────────────────────────────
  backend-frontend-simulation:
    name: Backend & Frontend Simulation
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js 18
        uses: actions/setup-node@v4
        with:
          node-version: "18"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "17"

      - name: Install frontend dependencies
        working-directory: ./frontend
        run: npm ci

      - name: Build frontend (production)
        working-directory: ./frontend
        run: npm run build

      - name: Simulate frontend dev server
        working-directory: ./frontend
        run: |
          npm run preview &
          sleep 5
          curl -f http://localhost:4173 && echo "✅ Frontend responding" || echo "⚠️  Frontend check failed"

      - name: Build backend APK (debug)
        working-directory: ./backend/android
        run: ./gradlew assembleDebug --no-daemon

      - name: Verify APK output
        run: |
          APK_PATH="./backend/android/app/build/outputs/apk/debug/app-debug.apk"
          if [ -f "$APK_PATH" ]; then
            echo "✅ APK built successfully: $APK_PATH"
          else
            echo "❌ APK not found"
            exit 1
          fi

      - name: Upload build artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-artifacts
          path: |
            ./frontend/dist/
            ./backend/android/app/build/outputs/apk/debug/app-debug.apk
